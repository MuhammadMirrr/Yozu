name: Release (Android AAB)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    name: Build signed AAB
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Decode upload keystore
        run: |
          echo "${{ secrets.UPLOAD_KEYSTORE_BASE64 }}" | base64 -d > android/upload-keystore.jks

      - name: Write key.properties
        run: |
          cat > android/key.properties <<EOF
          ${{ secrets.KEY_PROPERTIES }}
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Build release APK (split-per-abi)
        run: flutter build apk --release --split-per-abi

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: yozu-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

      - name: Upload APKs artifact
        uses: actions/upload-artifact@v4
        with:
          name: yozu-release-apks
          path: build/app/outputs/flutter-apk/*.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/app/outputs/bundle/release/app-release.aab
            build/app/outputs/flutter-apk/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
