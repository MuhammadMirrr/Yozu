name: uz_converter
description: "Yozu — O'zbek Lotin-Kirill konverter ilovasi"
publish_to: 'none'
version: 1.0.1+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  google_mobile_ads: ^5.3.1
  share_plus: ^10.0.0
  shared_preferences: ^2.2.0
  flutter_native_splash: ^2.4.7
  package_info_plus: ^8.0.0
  in_app_review: ^2.0.0
  receive_sharing_intent: ^1.8.1
  file_picker: ^11.0.2
  archive: ^4.0.9
  xml: ^6.5.0
  sqflite: ^2.4.0
  path: ^1.9.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0
  fake_async: ^1.3.1
  # integration_test (Windows Developer Mode yoqilgandan keyin qo'shish mumkin)
  # integration_test:
  #   sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#FF865E"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#FEF9EF"
  image: assets/icon/app_icon.png
  color_dark: "#1A1A1A"
  image_dark: assets/icon/app_icon.png
  android_12:
    color: "#FEF9EF"
    image: assets/icon/app_icon.png
    color_dark: "#1A1A1A"
    image_dark: assets/icon/app_icon.png

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
